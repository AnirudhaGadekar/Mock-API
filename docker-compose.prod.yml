version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: MockAPI-app
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      LOG_LEVEL: info
      DATABASE_URL: "${DATABASE_URL:-postgresql://${POSTGRES_USER:-MockAPI}:${POSTGRES_PASSWORD:-MockAPI_pass}@pgbouncer:5432/${POSTGRES_DB:-MockAPI}?schema=public&pgbouncer=true&connection_limit=1}"
      DIRECT_DATABASE_URL: "${DIRECT_DATABASE_URL:-postgresql://${POSTGRES_USER:-MockAPI}:${POSTGRES_PASSWORD:-MockAPI_pass}@postgres:5432/${POSTGRES_DB:-MockAPI}?schema=public}"
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-100}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-60000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      API_VERSION: ${API_VERSION:-v1}
      BASE_ENDPOINT_URL: ${BASE_ENDPOINT_URL:-http://localhost:3000/e}
    ports:
      - "3000:3000"
    command: ["npm", "start"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    restart: unless-stopped
    networks:
      - MockAPI-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:14-alpine
    container_name: MockAPI-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-MockAPI}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-MockAPI_pass}
      POSTGRES_DB: ${POSTGRES_DB:-MockAPI}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U MockAPI"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - MockAPI-network

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: MockAPI-pgbouncer
    environment:
      DATABASE_URL: "${DATABASE_URL:-postgresql://${POSTGRES_USER:-MockAPI}:${POSTGRES_PASSWORD:-MockAPI_pass}@postgres:5432/${POSTGRES_DB:-MockAPI}}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 5
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - MockAPI-network

  redis:
    image: redis:7-alpine
    container_name: MockAPI-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - MockAPI-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  MockAPI-network:
    driver: bridge
