version: '3.9'

services:
  postgres:
    image: postgres:14-alpine
    container_name: MockUrl-postgres
    environment:
      POSTGRES_USER: MockUrl
      POSTGRES_PASSWORD: MockUrl_pass
      POSTGRES_DB: MockUrl
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U MockUrl"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - MockUrl-network

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    container_name: MockUrl-pgbouncer
    environment:
      DATABASE_URL: "postgres://MockUrl:MockUrl_pass@postgres:5432/MockUrl"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 5
      SERVER_LIFETIME: 3600
      SERVER_IDLE_TIMEOUT: 600
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - MockUrl-network

  redis:
    image: redis:7-alpine
    container_name: MockUrl-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - MockUrl-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  MockUrl-network:
    driver: bridge
